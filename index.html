<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="keywords" content="html, css">
  <meta name="author" content="Ana Clarissi">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>NFT preview card component</title>

  <link rel="stylesheet" href="assets/css/style.css">

</head>
<body>

  <main class="container">
    <section class="container-card">

      <img src="assets/images/image-equilibrium.jpg" alt="" class="card-img">

      <h1 class="title">Equilibrium #3429</h1>

      <p class="subtitle">Our Equilibrium collection promotes balance and calm.</p>

      <article class="card-info">

        <p class="card-info-eth"><img src="assets/images/icon-ethereum.svg" alt=""><span>0.041 ETH</span></p>

        <p><img src="assets/images/icon-clock.svg" alt=""><span>3 days left</span></p>

      </article>
      
      <article class="perfil">
        
        <img src="assets/images/image-avatar.png" alt="" class="perfil-img">

        <p>Creation of <span>Jules Wyvern</span></p>

      </article>

    </section>
  </main>


</body>
</html>
